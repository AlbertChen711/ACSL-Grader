{% extends 'base.html' %}

{% block content %}
    <h1 class="title">ACSL Grader</h1>
    <p class="subtitle">Select a contest season below to get started</p>

    <div class="years-container">
        {% for year in years %}
            <a href="{{ url_for('season', year=year) }}" class="year-button">
                {{ year }}
            </a>
        {% endfor %}
    </div>
{% endblock %}
