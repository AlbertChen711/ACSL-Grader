<!DOCTYPE html>
<html>
<head>
    <title>Login - ACSL Grader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1 class="title">Login</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p class="flash-msg">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <!-- URL for logging in -->
    <form method="POST" class="auth-form">
        <input type="email" name="email" placeholder="Email" required class="auth-input">
        <input type="password" name="password" placeholder="Password" required class="auth-input">
        <button type="submit" class="submit-btn">Log In</button>
    </form>
    <!-- URL for signing up if you are on the login page and you don't have an account -->
    <p class="auth-link">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    <a href="/" class="back-button">← Back</a>
</body>
</html>
