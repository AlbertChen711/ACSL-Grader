<!DOCTYPE html>
<html>
<head>
    <title>Error - ACSL Grader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="top-bar">
        {% if user %}
            <span class="user-email">{{ user }}</span>
            <a href="{{ url_for('leaderboard') }}" class="auth-btn">Leaderboard</a>
            <a href="{{ url_for('logout') }}" class="auth-btn">Logout</a>
        {% endif %}
    </div>

    <h1 class="title">Oops!</h1>

    <div class="error-box">
        <p>{{ message }}</p>
    </div>

    <a href="/" class="back-button">← Back to Home</a>

</body>
</html>
